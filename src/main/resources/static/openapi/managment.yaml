    patch:
      summary: Editar un producto configurado
      description: Endpoint para editar un producto configurado del sistema, este luego se debe de actualizar en todas las referencias
      tags:
        - Producto Configurado
      parameters:
        - $ref: '#/components/parameters/productoConfiguradoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductoConfigurado'
      responses:
        '201':
          description: Producto configurado editado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Eliminar un producto configurado
      description: Endpoint para eliminar un producto configurado del sistema, se eliminará de todas las referencias
      tags:
        - Producto Configurado
      parameters:
        - $ref: '#/components/parameters/productoConfiguradoId'
      responses:
        '204':
          description: Producto configurado eliminado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
