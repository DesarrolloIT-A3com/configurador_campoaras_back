openapi: 3.0.3

info:
  title: Gestión de contenido Controller Campoaras API
  description: Endpoints para le gestión de contenido del configurador, entre ellos añadir productos, series, relaciones y combinaciones.
  version: 1.0.0

servers:
  - url: http://192.168.1.169:8080/
    description: Documentación de endpoints de desarrollo
 
#----------------------------------------------
# Seguridad global: cookie JWT
#----------------------------------------------

security:
  - cookieAuth: []

components: 
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: JWT 

  # Esquemas reutilizables
  schemas:
    # Esquema de errores
    CPException:
      type: object
      required:
          - code
          - message
      properties:
        code:
          type: integer
          description: Código de error
          example: 403
        message:
          type: string
          description: Mensaje de error
          example: "Forbidden: Access is denied"
        cause:
          type: object
          nullable: true
          description: Detalles adicionales del error normalmente suele ser otra excepcion de Java
          properties:
            exception:
              type: string
              description: Nombre de la clase de la excepción
              example: "java.lang.NullPointerException"
            message:
              type: string
              description: Mensaje de la excepción
              example: "Null reference encountered"
    
    Producto:
      type: object
      required:
        - nombre
        - tipo
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único del producto
          example: "123e4567-e89b-12d3-a456-426614174000"
        nombre:
          type: string
          description: Nombre del producto
          example: "Aqua"
        tipo:
          type: string
          description: Tipo del producto
          example: "Mueble"
        cajon:
          type: string
          description: Si el tipo del producto es un mueble se debe de indicar la marca que los provee
          example: "Hetttich"
    
    Serie:
      type: object
      required:
        - variante
        - modulo
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único de la variante del producto
          example: "123e4567-e89b-12d3-a456-426614174000"
        variante:
          type: string
          description: Variante del producto
          example: "Portalavabo 1 cajón"
        modulo:
          type: string
          description: Modulo que porta la variante
          example: "Mueble"
        extra:
          type: string
          description: Extras que porta la variante del producto
    
    Frente:
      type: object
      required:
        - nombre
        - referencia
        - regleta
        - tirador
        - acabados
        - acabadosExtension
        - productos
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único del frente
          example: "123e4567-e89b-12d3-a456-426614174000"
        nombre:
          type: string
          description: Nombre del frente
          example: "Frente Principal"
        referencia:
          type: string
          description: Referencia única del frente
          example: "IN"
        regleta:
          type: boolean
          description: Indica si el frente incluye regleta
          example: true
        tirador:
          type: boolean
          description: Indica si el frente incluye tirador
          example: false
        acabados:
          type: array
          items:
            type: string
          description: Lista de acabados asociados al frente
          example: ["Mate", "Brillante"]
        acabadosExtension:
          type: array
          items:
            type: string
          description: Lista de acabados asociados a la regleta o tirador del frente
          example: ["Madera", "Cromado"]
        productos:
          type: array
          items:
            type: string
          description: Productos al que pertenece el frente siendo el uuid del producto
          example: ["123e4567-e89b-12d3-a456-426614174000"]

    Acabado:
      type: object
      required:
        - nombre
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único del acabado
          example: "123e4567-e89b-12d3-a456-426614174000"
        nombre:
          type: string
          description: Nombre del acabado
          example: "Acabado Mate"
        tipos:
          type: array
          items:
            type: string
          description: Lista de tipos asociados al acabado
          example: ["Natural", "Seda"]
        colores:
          type: array
          items:
            type: string
          description: Lista de colores asociados al acabado
          example: ["Rojo", "Azul", "Verde"]
    
    Color:
      type: object
      required:
        - nombre
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único del color
          example: "123e4567-e89b-12d3-a456-426614174000"
        nombre:
          type: string
          description: Nombre del color
          example: "Rojo"
        acabados:
          type: array
          items:
            type: string
          description: Lista de acabados asociados al color
          example: ["Mate", "Brillante"]

    Configuracion:
      type: object
      required:
        - referencia
        - fondo
        - ancho
        - alto
        - altoMax
        - fondoMin
        - fondoMax
        - precioMedidaFondoEsp
        - precioMedidaAnchoEsp
        - precioMedidaAltoEsp
        - armazon
        - frente
        - armazon_frente
        - serie
      properties:
        referencia:
          type: string
          description: Referencia única de la configuración
          example: "CONF12345"
        fondo:
          type: number
          format: float
          description: Fondo de la configuración
          example: 50.0
        ancho:
          type: number
          format: float
          description: Ancho de la configuración
          example: 100.0
        alto:
          type: number
          format: float
          description: Alto de la configuración
          example: 200.0
        altoMax:
          type: number
          format: float
          description: Alto máximo permitido para la configuración
          example: 250.0
        fondoMin:
          type: number
          format: float
          description: Fondo mínimo permitido para la configuración
          example: 30.0
        fondoMax:
          type: number
          format: float
          description: Fondo máximo permitido para la configuración
          example: 70.0
        precioMedidaFondoEsp:
          type: number
          format: float
          description: Precio adicional por medidas de fondo especiales
          example: 40.0
        precioMedidaAnchoEsp:
          type: number
          format: float
          description: Precio adicional por medidas de ancho especiales
          example: 60.0
        precioMedidaAltoEsp:
          type: number
          format: float
          description: Precio adicional por medidas de alto especiales
          example: 80.0
        armazon:
          type: array
          items:
            type: object
            description: Lista de armazones asociados a la configuración
            properties:
              nombre:
                type: string
                description: Nombre del acabado del armazón
                example: "Melamina"
              precio:
                type: number
                format: float
                description: Precio del armazón
                example: 150.0
        extras:
          type: array
          items:
            type: object
            description: Posibles extras asociados a la configuración
            properties:
              nombre:
                type: string
                description: Nombre del extra
                example: "Cambio de simetría"
              precio:
                type: number
                format: float
                description: Precio extra 
                example: 50.0
        serie:
          type: string
          description: Serie asociada a la configuración siendo el uuid de la serie
          example: "123e4567-e89b-12d3-a456-426614174000"

    ProductoConfigurado:
      type: object
      required:
        - referencia
        - usuario
        - precioArmazon
        - tipoAcabadoArmazon
        - precioFrente
        - frente
        - tipoAcabadoFrente
        - precioTirador
        - tipoAcabadoTirador
        - precioRegleta
        - tipoAcabadoRegleta
        - cantidad
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único del producto configurado
          example: "123e4567-e89b-12d3-a456-426614174000"
          nullable: true
        referencia:
          type: string
          description: Referencia única del producto configurado
          example: "2001"
        usuario:
          type: string
          description: Uuid o nombre del Usuario que ha configurado el producto
          example: "USER123"
        precioArmazon:
          type: number
          format: float
          description: Precio del armazón
          example: 150.0
        tipoAcabadoArmazon:
          type: string
          description: Tipo de acabado del armazón
          example: "Mate"
        precioFrente:
          type: number
          format: float
          description: Precio del frente
          example: 200.0
        tipoAcabadoFrente:
          type: string
          description: Tipo de acabado del frente
          example: "Brillante"
        precioTirador:
          type: number
          format: float
          description: Precio del tirador
          example: 50.0
        tipoAcabadoTirador:
          type: string
          description: Tipo de acabado del tirador
          example: "Cromado"
        precioRegleta:
          type: number
          format: float
          description: Precio de la regleta
          example: 30.0
        tipoAcabadoRegleta:
          type: string
          description: Tipo de acabado de la regleta
          example: "Madera"
        cantidad:
          type: integer
          description: Cantidad de productos configurados
          example: 10

    Pedido:
      type: object
      required:
        - fecha
        - referencia
        - productos
        - usuario
      properties:
        uuid:
          type: string
          format: uuid
          description: Identificador único del pedido
          example: "123e4567-e89b-12d3-a456-426614174000"
        fecha:
          type: string
          format: date-time
          description: Fecha y hora del pedido
          example: "2024-06-01T12:00:00Z"
        referencia:
          type: string
          description: Referencia del pedido, lo debe de introducir el usuario
          example: "REF-001"
        estado:
          type: string
          enum: [NO_ENVIADO,ENVIADO,ACEPTADO,RECHAZADO]
          description: Estado del pedido
          example: ENVIADO
    
        productos:
          type: array
          description: Lista de productos configurados en el pedido
          items:
            $ref: '#/components/schemas/ProductoConfigurado'
        usuario:
          type: string
          description: Uuid o nombre del Usuario que ha realizado el pedido
          example: "USER123"
          
  responses:
    Unauthorized:
      description: No autorizado -- Cookie JWT ausente o inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CPException'
          example:
            code: 401
            message: "Unauthorized: JWT cookie is missing or invalid"
    Forbidden:
      description: Prohibido -- El usuario no tiene el rol necesario o ha realizado acciones no permitidas
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CPException'
          example:
            code: 403
            message: "Forbidden: Access is denied"    
    NotFound:
      description: No encontrado -- El recurso solicitado no existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CPException'
          example:
            code: 404
            message: "Not Found: The requested resource does not exist"
    BadRequest:
      description: Solicitud incorrecta -- El cliente ha enviado datos inválidos o mal formados
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CPException'
          example:
            code: 400
            message: "Bad Request: The request is invalid or malformed"
    InternalServerError:
      description: Error interno del servidor -- Ocurrió un error inesperado en el servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CPException'
          example:
            code: 500
            message: "Internal Server Error: An unexpected error occurred on the server"
    ServerNotAvailable:
      description: Servicio no disponible -- El servidor no puede manejar la solicitud en este momento
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CPException'
          example:
            code: 503
            message: "Service Unavailable: The server is currently unable to handle the request"
   
  parameters:
    productId:
      name: productId
      in: path
      required: true
      schema:
        type: string
      description: UUID del producto
      example: "123e4567-e89b-12d3-a456-426614174000"
    serieId:
      name: serieId
      in: path
      required: true
      schema:
        type: string
      description: UUID de la serie
      example: "123e4567-e89b-12d3-a456-426614174000"
    frenteId:
      name: frenteId
      in: path
      required: true
      schema:
        type: string
      description: UUID del frente
      example: "123e4567-e89b-12d3-a456-426614174000"
    acabadoId:
      name: acabadoId
      in: path
      required: true
      schema:
        type: string
      description: UUID del acabado
      example: "123e4567-e89b-12d3-a456-426614174000"
    colorId:
      name: colorId
      in: path
      required: true
      schema:
        type: string
      description: UUID del color
      example: "123e4567-e89b-12d3-a456-426614174000"
    configuracionId:
      name: configuracionId
      in: path
      required: true
      schema:
        type: string
      description: Id de referencia de configuración
      example: "1705"
    productoConfiguradoId:
      name: productoConfiguradoId
      in: path
      required: true
      schema:
        type: string
      description: UUID del producto configurado
      example: "123e4567-e89b-12d3-a456-426614174000"
    uuidFilter:
      name: uuid
      in: query
      required: false
      schema:
        type: string
      description: Filtro opcional para buscar por UUID
      example: "123e4567-e89b-12d3-a456-426614174000"

paths:

  /v1/managment/products:
    get:
      summary: Listar productos
      description: Endpoint para obtener la lista de productos del sistema.
      tags:
        - Productos
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de productos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Añadir un nuevo producto
      tags:
        - Productos
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - producto
                - img
              properties:
                producto:
                  $ref: '#/components/schemas/Producto'
                img:
                  type: string
                  format: binary
                  description: Imagen del producto en formato PNG o JPEG
            encoding:
              producto:
                contentType: application/json 
              img:
                contentType: image/png, image/jpeg
      responses:
        '201':
          description: Producto creado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/managment/products/{productId}:
    patch:
      summary: Editar un producto
      description: Endpoint para editar un producto del sistema, este luego se debe de actualizar en todas las referencias
      tags:
        - Productos
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - producto
                - img
              properties:
                producto:
                  $ref: '#/components/schemas/Producto'
                img:
                  type: string
                  format: binary
                  description: Imagen del producto en formato PNG o JPEG
            encoding:
              producto:
                contentType: application/json 
              img:
                contentType: image/png, image/jpeg
      responses:
        '201':
          description: Producto editado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Eliminar un producto
      description: Endpoint para eliminar un producto del sistema, se eliminará de todas las referencias
      tags:
        - Productos
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/productId'
      responses:
        '204':
          description: Producto eliminado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/managment/series:
    get:
      summary: Listar series
      description: Endpoint para obtener la lista de series del sistema.
      tags:
        - Series
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/uuidFilter'
      responses:
        '200':
          description: Lista de series obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Serie'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/managment/series/{productId}:
    post:
      summary: Añadir una nueva serie
      description: Endpoint para añadir una nueva serie al sistema, se le debe de pasar el uuid de un producto para que se asocie.
      tags:
        - Series
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - serie
                - img
              properties:
                serie:
                  $ref: '#/components/schemas/Serie'
                img:
                  type: string
                  format: binary
                  description: Imagen de la serie en formato PNG o JPEG
            encoding:
              serie:
                contentType: application/json 
              img:
                contentType: image/png, image/jpeg
      responses:
        '201':
          description: Serie creada exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/managment/series/{serieId}/product/{productId}:
    patch:
      summary: Editar una serie
      description: Endpoint para editar una serie del sistema, esta luego se debe de actualizar en todas las referencias
      tags:
        - Series
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/serieId'
        - $ref: '#/components/parameters/productId'

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - serie
                - img
              properties:
                serie:
                  $ref: '#/components/schemas/Serie'
                img:
                  type: string
                  format: binary
                  description: Imagen de la serie en formato PNG o JPEG
            encoding:
              serie:
                contentType: application/json 
              img:
                contentType: image/png, image/jpeg
      
      responses:
        '201':
          description: Serie editada exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  
  /v1/managment/series/{serieId}:
    delete:
      summary: Eliminar una serie
      description: Endpoint para eliminar una serie del sistema, se eliminará de todas las referencias
      tags:
        - Series
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/serieId'
      responses:
        '204':
          description: Serie eliminada exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/managment/frentes:
    get:
      summary: Listar frentes
      description: Endpoint para obtener la lista de frentes del sistema.
      tags:
        - Frentes
      parameters:
        - $ref: '#/components/parameters/uuidFilter'
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de frentes obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Frente'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Añadir un nuevo frente
      description: Endpoint para añadir un nuevo frente al sistema.
      tags:
        - Frentes
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - frente
                - img
              properties:
                frente:
                  $ref: '#/components/schemas/Frente'
                img:
                  type: string
                  format: binary
                  description: Imagen del frente en formato PNG o JPEG
            encoding:
              frente:
                contentType: application/json 
              img:
                contentType: image/png, image/jpeg
          
      responses:
        '201':
          description: Frente creado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/managment/frentes/{frenteId}:
    patch:
      summary: Editar un frente
      description: Endpoint para editar un frente del sistema, este luego se debe de actualizar en todas las referencias
      tags:
        - Frentes
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/frenteId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - frente
                - img
              properties:
                frente:
                  $ref: '#/components/schemas/Frente'
                img:
                  type: string
                  format: binary
                  description: Imagen del frente en formato PNG o JPEG
            encoding:
              frente:
                contentType: application/json 
              img:
                contentType: image/png, image/jpeg
      responses:
        '201':
          description: Frente editado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Eliminar un frente
      description: Endpoint para eliminar un frente del sistema, se eliminará de todas las referencias
      tags:
        - Frentes
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/frenteId'
      responses:
        '204':
          description: Frente eliminado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

