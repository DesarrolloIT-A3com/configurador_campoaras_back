spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/configurador_campoaras
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${ADMIN_MAIL}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  server:
    address: 192.168.1.169
    #address: 192.168.0.177
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
    
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls-primary-name: Admin
    urls:
      - name: Auth
        url: /openapi/auth.yaml
      - name: Admin
        url: /openapi/admin.yaml
      - name: Managment
        url: /openapi/managment.yaml
      - name: General
        url: /openapi/general.yaml
      - name: Order
        url: /openapi/order.yaml
       
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO         
    
  file:
    name: logs/campoaras.log
  logback:                
  log4j2:                 
    config: classpath:log4j2-spring.xml

jwt:
  secret-key: ${CPWT_KEY}
  acces-token-expiration: 600000
  refresh-token-expiration: 10800000

url-cors: ${URL_CORS}

crypto:
  password: ${PASSWORD}
  salt: ${SALT}

